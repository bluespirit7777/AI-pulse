name: Update YouTube trending videos

on:
  schedule:
    # Twice a day, off the congested :00/:30 slots (same reasoning as the
    # main data pipeline) and offset from it so the two jobs don't collide.
    - cron: '22 3,15 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-youtube
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch trending videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/update-youtube.mjs

      - name: Validate data
        run: npm run validate

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youtube-trending.json
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore: refresh YouTube trending videos [skip ci]"
          # Same race as update-data.yml: this can land between a manual push
          # and the twice-hourly data workflow's own push. Retry with a
          # fetch+rebase; if the rebase itself conflicts, drop the old commit
          # object and re-commit the already-regenerated working tree fresh on
          # top of the new tip.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — remote moved, rebasing and retrying..."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              git reset --soft origin/main
              git add data/youtube-trending.json
              git commit -m "chore: refresh YouTube trending videos [skip ci]"
            fi
            sleep $((RANDOM % 5 + 1))
          done
          echo "::error::Failed to push YouTube snapshot after 5 attempts."
          exit 1
