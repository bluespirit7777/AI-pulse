name: Update AI Market Pulse data

on:
  schedule:
    # Twice hourly at :07 and :37 — off the congested :00/:30 slots so runs
    # start more reliably. Treat as "near-live", not to-the-second.
    - cron: '7,37 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest data
        run: node scripts/update-data.mjs

      - name: Validate data + run unit tests
        run: npm run check

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore: refresh data snapshot [skip ci]"
          # This runs every 30 min and can race a manual push (or the YouTube
          # workflow) landing on main between checkout and push. A bare `git
          # push` then gets rejected as non-fast-forward. Retry: fetch + rebase
          # our one generated-data commit onto the new tip and push again.
          # `git add data/` (not a fixed file list) so every file the build
          # script writes is always included — a previously-missed one
          # (data/compute-history.json) sat unstaged forever, which is
          # harmless for a plain push but made `git rebase` refuse to run at
          # all ("You have unstaged changes"), since rebase requires a clean
          # tree regardless of which paths it's touching.
          # `git rebase --abort` is guarded with `|| true`: when rebase fails
          # at that same pre-flight check, it never actually starts, so
          # `--abort` has nothing to abort and errors "no rebase in progress"
          # — harmless, but fatal to the whole script under Actions' default
          # `set -e` if left unguarded (this is what actually produced the
          # exit-128 failure). If the rebase attempt didn't leave a clean
          # fast-forward, drop our old commit object and re-commit the
          # already-regenerated working tree fresh on top of the new tip
          # instead of hand-resolving a diff nobody reads.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — remote moved, rebasing and retrying..."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort 2>/dev/null || true
              git reset --soft origin/main
              git add data/
              git commit -m "chore: refresh data snapshot [skip ci]" || echo "Nothing to commit — remote already matches."
            fi
            sleep $((RANDOM % 5 + 1))
          done
          echo "::error::Failed to push data snapshot after 5 attempts."
          exit 1
