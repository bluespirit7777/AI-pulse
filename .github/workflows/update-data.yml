name: Update AI Market Pulse data

on:
  schedule:
    # Every 30 minutes. GitHub Actions cron can lag under load; treat this as
    # "near-live", not to-the-second.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest data
        run: node scripts/update-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh data snapshot [skip ci]"
            git push
          fi
